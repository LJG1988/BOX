<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LJG · 我的工具集</title>
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            /* 森林护眼主色调：柔和的绿色渐变 + 自然光影 */
            background: radial-gradient(circle at 30% 20%, #2d4a2d, #1a2e1a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 森林光斑 + 柔和光晕 (护眼柔光) */
        body::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 60% 30%, rgba(180, 220, 150, 0.06), transparent 45%),
                        radial-gradient(circle at 20% 80%, rgba(160, 200, 130, 0.05), transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(200, 230, 170, 0.04), transparent 40%);
            animation: forestGlow 14s infinite alternate ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes forestGlow {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.5; }
            100% { transform: translate(2%, -1%) scale(1.15) rotate(3deg); opacity: 1; }
        }

        /* 主卡片 — 木质/自然质感 + 柔光 */
        .forest-card {
            position: relative;
            z-index: 2;
            background: rgba(30, 50, 30, 0.78);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid rgba(160, 200, 130, 0.25);
            box-shadow: 0 0 60px rgba(100, 180, 80, 0.12), 0 0 120px rgba(60, 140, 50, 0.06), inset 0 0 40px rgba(160, 200, 130, 0.04);
            border-radius: 40px 40px 32px 32px;
            padding: 3.5rem 4rem;
            max-width: 800px;
            width: 100%;
            text-align: center;
            transition: all 0.3s ease;
            animation: cardEntry 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes cardEntry {
            0% { opacity: 0; transform: scale(0.94) translateY(16px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* 标题：森林绿 + 护眼暖黄 */
        h1 {
            font-size: 3.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #b8d9a8, #8fbc7a, #6a9e5a, #b8d9a8);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: forestTitle 6s ease-in-out infinite alternate;
            text-shadow: 0 0 40px rgba(120, 200, 80, 0.08);
            margin-bottom: 0.2rem;
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', sans-serif;
        }

        @keyframes forestTitle {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 副标题 — 自然清新 */
        .subhead {
            font-size: 0.95rem;
            color: #a0c890;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: -6px;
            margin-bottom: 2rem;
            font-weight: 400;
            border-bottom: 1px solid rgba(160, 200, 130, 0.15);
            padding-bottom: 12px;
            display: inline-block;
            text-shadow: 0 0 20px rgba(120, 200, 80, 0.06);
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }

        .subhead i {
            color: #8fbc7a;
            filter: drop-shadow(0 0 8px #6a9e5a44);
        }

        /* 工具列表 — 森林「树桩/叶片」风格 */
        .tool-list {
            list-style: none;
            padding: 0;
            margin: 2.2rem 0 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .tool-list li {
            background: rgba(25, 45, 25, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(160, 200, 130, 0.2);
            border-radius: 60px;
            padding: 0.95rem 1.8rem;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(120, 200, 80, 0.02);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 发光边框 & 悬停效果 — 柔和叶片光晕 */
        .tool-list li:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: #b8d9a8;
            box-shadow: 0 0 40px rgba(160, 220, 130, 0.25), 0 0 80px rgba(100, 180, 80, 0.10), inset 0 0 30px rgba(160, 200, 130, 0.06);
            background: rgba(35, 60, 35, 0.85);
        }

        /* 每个列表项前的自然小图标 (叶片/树木/流水) */
        .tool-list li::before {
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: #8fbc7a;
            margin-right: 18px;
            font-size: 1.5rem;
            opacity: 0.7;
            transition: 0.3s;
            text-shadow: 0 0 12px #6a9e5a33;
        }

        .tool-list li:nth-child(1)::before { content: '\f06c'; }  /* 树叶 — 拾光录 */
        .tool-list li:nth-child(2)::before { content: '\f0d1'; }  /* 火箭 (代表清风/速递) — 快递 */
        .tool-list li:nth-child(3)::before { content: '\f0f7'; }  /* 瓶 (代表露水/会议) 改用 树木: \f1bb */
        .tool-list li:nth-child(3)::before { content: '\f1bb'; }  /* 树木 — 会议 */

        .tool-list li:hover::before {
            color: #b8d9a8;
            transform: scale(1.15) rotate(6deg);
            text-shadow: 0 0 30px #8fbc7a;
        }

        /* 链接样式 — 柔和护眼字体 */
        .tool-list li a {
            font-size: 1.6rem;
            font-weight: 600;
            text-decoration: none;
            color: #c8dcc0;
            letter-spacing: 1px;
            text-shadow: 0 0 12px rgba(120, 200, 80, 0.04);
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            justify-content: center;
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', sans-serif;
        }

        /* 链接悬停 — 暖黄柔光 */
        .tool-list li:hover a {
            color: #e0f0d0;
            text-shadow: 0 0 30px #b8d9a844, 0 0 60px #8fbc7a22;
        }

        /* 每个链接添加森林小彩蛋 */
        .tool-list li a::after {
            content: '';
            font-size: 0.75rem;
            margin-left: 12px;
            opacity: 0.4;
            font-weight: 300;
            color: #8fbc7a;
            transition: 0.25s;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            letter-spacing: 1px;
        }

        .tool-list li:nth-child(1) a::after { content: '· 林间光'; }
        .tool-list li:nth-child(2) a::after { content: '· 山风'; }
        .tool-list li:nth-child(3) a::after { content: '· 树语'; }

        .tool-list li:hover a::after {
            opacity: 0.8;
            color: #b8d9a8;
            text-shadow: 0 0 16px #8fbc7a66;
        }

        /* 底部 — 森林护眼标语 */
        .forest-footer {
            margin-top: 2.8rem;
            color: rgba(160, 200, 130, 0.4);
            font-size: 0.8rem;
            letter-spacing: 3px;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            text-transform: uppercase;
            border-top: 1px solid rgba(160, 200, 130, 0.1);
            padding-top: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .forest-footer i {
            color: #8fbc7a;
            font-size: 1.4rem;
            filter: drop-shadow(0 0 12px #6a9e5a44);
        }

        .forest-footer span {
            background: linear-gradient(135deg, #b8d9a8, #8fbc7a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .forest-footer .quote {
            font-size: 0.7rem;
            opacity: 0.5;
            color: #a0c890;
            letter-spacing: 2px;
        }

        /* 响应式优化 */
        @media (max-width: 650px) {
            .forest-card {
                padding: 2.2rem 1.5rem;
                border-radius: 32px;
            }

            h1 {
                font-size: 2.8rem;
                letter-spacing: 2px;
            }

            .tool-list li a {
                font-size: 1.3rem;
                flex-wrap: wrap;
            }

            .tool-list li a::after {
                content: '' !important;
                display: none;
            }

            .tool-list li::before {
                margin-right: 10px;
                font-size: 1.3rem;
            }

            .subhead {
                font-size: 0.7rem;
                letter-spacing: 4px;
            }

            .forest-footer {
                font-size: 0.65rem;
                gap: 8px;
            }
        }

        @media (max-width: 420px) {
            h1 {
                font-size: 2.2rem;
            }

            .tool-list li {
                padding: 0.7rem 1rem;
                border-radius: 50px;
            }

            .tool-list li a {
                font-size: 1.0rem;
            }

            .forest-footer i {
                font-size: 1.2rem;
            }
        }

        /* 额外装饰：自然元素 (叶片/松果) */
        .forest-card::before {
            content: '🌿';
            position: absolute;
            top: 18px;
            left: 24px;
            font-size: 2.2rem;
            opacity: 0.10;
            transform: rotate(-10deg);
            filter: drop-shadow(0 0 12px #6a9e5a33);
        }

        .forest-card::after {
            content: '🍃';
            position: absolute;
            bottom: 18px;
            right: 24px;
            font-size: 2.2rem;
            opacity: 0.10;
            transform: rotate(10deg);
            filter: drop-shadow(0 0 12px #6a9e5a33);
        }

        /* 内层自然光晕 */
        .forest-card .nature-orb {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(160, 200, 130, 0.03), transparent 70%);
            pointer-events: none;
            z-index: 0;
            border: 1px dashed rgba(160, 200, 130, 0.05);
        }
    </style>
</head>
<body>
    <div class="forest-card">
        <!-- 自然光晕装饰 -->
        <div class="nature-orb"></div>

        <!-- 主标题 森林护眼风格 -->
        <h1>🌳 我的百宝箱</h1>
        <div class="subhead">
            <i class="fas fa-circle" style="margin-right: 8px; color: #8fbc7a; font-size: 0.6rem;"></i> 
            弄类不赖
            <i class="fas fa-circle" style="margin-left: 8px; color: #8fbc7a; font-size: 0.6rem;"></i>
        </div>

        <!-- 工具列表 — 自然护眼风格 -->
        <ul class="tool-list">
            <li>
                <a href="拾光录.html">
                    <i class="fas fa-leaf" style="color: #8fbc7a; font-size: 1.4rem; filter: drop-shadow(0 0 8px #6a9e5a44);"></i>
                    拾光录
                </a>
            </li>
            <li>
                <a href="快递报价查询.html">
                    <i class="fas fa-wind" style="color: #8fbc7a; font-size: 1.4rem; filter: drop-shadow(0 0 8px #6a9e5a44);"></i>
                    快递报价查询
                </a>
            </li>
            <li>
                <a href="会议发起人.html">
                    <i class="fas fa-tree" style="color: #8fbc7a; font-size: 1.4rem; filter: drop-shadow(0 0 8px #6a9e5a44);"></i>
                    会议发起人
                </a>
            </li>
        </ul>

        <!-- 森林护眼底部 — 自然语录 -->
        <div class="forest-footer">
            <i class="fas fa-seedling"></i>
            <span> 纯装饰 </span>
            <i class="fas fa-feather" style="color: #8fbc7a;"></i>
            <span class="quote">
                <i class="fas fa-circle" style="color: #8fbc7a; font-size: 0.4rem;"></i> 
                不知该写点啥 
                <i class="fas fa-circle" style="color: #8fbc7a; font-size: 0.4rem;"></i>
            </span>
        </div>
    </div>
</body>
</html>
