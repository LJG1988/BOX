<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>会议发起者 · 排班日历</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            background: #f0f5fb;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
        }
        .app {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 0;
            box-shadow: none;
            padding: 16px 14px 20px;
            min-height: 100vh;
            min-height: 100dvh;
        }
        @media (min-width: 481px) {
            .app {
                border-radius: 28px;
                box-shadow: 0 12px 28px rgba(0, 20, 40, 0.10);
                min-height: auto;
                padding: 20px 18px 24px;
                margin: 12px;
            }
            html, body {
                padding: 12px;
            }
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            color: #0b2b3f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 4px;
            border-bottom: 2px solid #eaf1f8;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 4px;
        }
        h1 small {
            font-size: 15px;
            font-weight: 500;
            color: #2a5e7a;
            background: #e9f0f6;
            padding: 4px 14px;
            border-radius: 40px;
            white-space: nowrap;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 6px;
        }
        .nav {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #f2f7fc;
            padding: 2px 6px 2px 10px;
            border-radius: 40px;
            flex: 1;
            min-width: 0;
        }
        .nav button {
            background: white;
            border: none;
            font-size: 20px;
            width: 32px;
            height: 32px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #1f4a66;
            border: 1px solid #d6e2ed;
            transition: 0.1s;
            flex-shrink: 0;
            touch-action: manipulation;
        }
        .nav button:active {
            background: #d9e4ef;
        }
        .nav span {
            font-weight: 550;
            font-size: 15px;
            text-align: center;
            color: #0b2b3f;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .btn {
            background: white;
            border: 1px solid #cbdae7;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 500;
            color: #1f4a66;
            cursor: pointer;
            font-size: 12px;
            background: #fafdff;
            transition: 0.1s;
            white-space: nowrap;
            touch-action: manipulation;
        }
        .btn:active {
            background: #d9e4ef;
        }
        .btn-primary {
            background: #1f4a66;
            border-color: #1f4a66;
            color: white;
        }
        .btn-primary:active {
            background: #143a52;
        }
        .calendar {
            margin-top: 4px;
            background: #fbfdff;
            border-radius: 20px;
            padding: 4px 2px 2px 2px;
            border: 1px solid #e4ecf5;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 500;
            font-size: 11px;
            color: #3b5d78;
            padding: 4px 0 6px 0;
            border-bottom: 1px solid #e6eef7;
        }
        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            padding: 4px 2px;
        }
        .day-cell {
            aspect-ratio: 1 / 1;
            background: white;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 450;
            color: #1a3346;
            padding: 1px;
            border: 1px solid transparent;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            transition: 0.05s;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
            min-height: 36px;
        }
        .day-cell.other-month {
            color: #97b1c7;
            background: #f8fbfe;
        }
        .day-cell.today {
            border: 2px solid #2d7fc1;
            background: #f0f7ff;
        }
        .day-cell .initials {
            font-size: 10px;
            font-weight: 600;
            line-height: 1.2;
            background: #e6eff8;
            padding: 0px 5px;
            border-radius: 30px;
            margin-top: 0px;
            color: #13415c;
            max-width: 95%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .day-cell .initials.holiday-badge {
            background: #f4e0e0;
            color: #a54848;
        }
        .day-cell .day-number {
            font-weight: 500;
            font-size: 15px;
            line-height: 1.1;
            margin-bottom: 0px;
        }
        .day-cell .holiday-indicator {
            background: #d6a2a2;
            color: #631f1f;
            font-size: 7px;
            padding: 0 4px;
            border-radius: 20px;
            margin-top: 0px;
            font-weight: 500;
        }
        .day-cell .status-badge {
            position: absolute;
            top: -3px;
            right: -3px;
            font-size: 7px;
            border-radius: 30px;
            padding: 0 4px;
            line-height: 12px;
            font-weight: 600;
            color: white;
        }
        .day-cell .status-badge.cancelled {
            background: #c0392b;
        }
        .day-cell .status-badge.modified {
            background: #e67e22;
        }
        .footer-note {
            margin-top: 12px;
            padding: 8px 12px;
            background: #eef4fa;
            border-radius: 40px;
            font-size: 12px;
            color: #1a405a;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
        }
        .footer-note .status {
            font-weight: 500;
            background: white;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 12px;
        }
        .popup-menu {
            position: fixed;
            background: white;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
            padding: 6px 0;
            min-width: 150px;
            z-index: 999;
            display: none;
            overflow: hidden;
            animation: fadeIn 0.15s ease;
        }
        .popup-menu .menu-item {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            color: #1a3346;
            border-bottom: 1px solid #f0f4f9;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .popup-menu .menu-item:last-child {
            border-bottom: none;
        }
        .popup-menu .menu-item:active {
            background: #eef4fa;
        }
        .popup-menu .menu-item.danger {
            color: #c0392b;
        }
        .popup-menu .menu-item .icon {
            font-size: 16px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(3px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: white;
            max-width: 380px;
            width: 100%;
            padding: 24px 20px;
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            animation: fadeIn 0.2s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h2 {
            font-size: 20px;
            margin-bottom: 14px;
            color: #0b2b3f;
            border-bottom: 2px solid #eaf1f8;
            padding-bottom: 8px;
        }
        .modal label {
            font-weight: 500;
            color: #1f4a66;
            display: block;
            margin-top: 12px;
            margin-bottom: 3px;
            font-size: 13px;
        }
        .modal input, .modal select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d6e2ed;
            border-radius: 60px;
            font-size: 14px;
            background: #fafdff;
        }
        .modal input:focus, .modal select:focus {
            outline: none;
            border-color: #2d7fc1;
            box-shadow: 0 0 0 3px rgba(45, 127, 193, 0.15);
        }
        .modal .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .modal .modal-actions .btn {
            padding: 6px 18px;
            font-size: 14px;
        }
        .hint {
            font-size: 11px;
            color: #5f7d96;
            margin-top: 3px;
        }
        @media (max-width: 400px) {
            .app { padding: 12px 10px 16px; }
            h1 { font-size: 17px; }
            h1 small { font-size: 13px; padding: 3px 10px; }
            .nav span { font-size: 13px; }
            .nav button { width: 28px; height: 28px; font-size: 17px; }
            .btn { font-size: 11px; padding: 3px 8px; }
            .day-cell { font-size: 12px; min-height: 30px; border-radius: 10px; }
            .day-cell .day-number { font-size: 13px; }
            .day-cell .initials { font-size: 9px; padding: 0 4px; }
            .weekdays { font-size: 10px; }
            .footer-note { font-size: 11px; padding: 6px 10px; }
            .footer-note .status { font-size: 11px; padding: 2px 10px; }
            .popup-menu { min-width: 130px; }
            .popup-menu .menu-item { padding: 8px 14px; font-size: 13px; }
            .modal { padding: 20px 16px; }
            .modal h2 { font-size: 18px; }
            .modal input, .modal select { font-size: 13px; padding: 7px 10px; }
        }
        @media (max-width: 360px) {
            .app { padding: 8px 6px 12px; }
            h1 { font-size: 15px; }
            h1 small { font-size: 11px; padding: 2px 8px; }
            .nav span { font-size: 11px; }
            .nav button { width: 24px; height: 24px; font-size: 14px; }
            .btn { font-size: 10px; padding: 2px 6px; }
            .day-cell { font-size: 11px; min-height: 26px; border-radius: 8px; gap: 1px; }
            .day-cell .day-number { font-size: 11px; }
            .day-cell .initials { font-size: 8px; padding: 0 3px; }
            .weekdays { font-size: 9px; padding: 3px 0; }
            .footer-note { font-size: 10px; padding: 4px 8px; flex-direction: column; align-items: center; }
            .footer-note .status { font-size: 10px; padding: 2px 8px; }
            .days-grid { gap: 1px; padding: 2px 1px; }
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <h1>
        📅 会议发起者
        <small id="todayInitiatorBadge">今天: 我</small>
    </h1>
    <div class="toolbar">
        <div class="nav">
            <button id="prevMonth">‹</button>
            <span id="monthLabel">2026年6月</span>
            <button id="nextMonth">›</button>
        </div>
        <div class="actions">
            <button class="btn" id="settingsBtn">⚙️</button>
            <button class="btn" id="resetTodayBtn">↺</button>
        </div>
    </div>

    <div class="calendar">
        <div class="weekdays">
            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
        </div>
        <div class="days-grid" id="daysGrid"></div>
    </div>

    <div class="footer-note">
        <span>📌 点击日期 · 取消/改人</span>
        <span class="status" id="todayInfo">今天: 我</span>
    </div>
</div>

<div class="popup-menu" id="popupMenu">
    <div class="menu-item" id="menuCancel">
        <span class="icon">✕</span> 取消会议
    </div>
    <div class="menu-item" id="menuChange">
        <span class="icon">🔄</span> 更改发起人
    </div>
    <div class="menu-item" id="menuReset">
        <span class="icon">↺</span> 重置为默认
    </div>
</div>

<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <h2>⚙️ 排班设置</h2>
        <label>👤 发起人 A</label>
        <input type="text" id="personAInput" placeholder="例如: 我" value="我">
        <label>👤 发起人 B</label>
        <input type="text" id="personBInput" placeholder="例如: 同事" value="同事">
        <label>📅 基准日期 (开始交替)</label>
        <input type="date" id="baseDateInput" value="2026-06-22">
        <label>🔁 基准日发起人</label>
        <select id="baseInitiatorSelect">
            <option value="A">发起人 A</option>
            <option value="B">发起人 B</option>
        </select>
        <div class="hint">* 周六日及法定节假日默认无会议</div>
        <div class="modal-actions">
            <button class="btn" id="closeSettingsBtn">取消</button>
            <button class="btn btn-primary" id="saveSettingsBtn">保存</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ----- 数据持久化 -----
        const STORAGE_KEY = 'meeting_scheduler_data';
        
        // 默认配置
        const defaultConfig = {
            personA: '我',
            personB: '同事',
            baseDate: '2026-06-22',
            baseInitiator: 'A'
        };

        // 从 localStorage 加载数据
        function loadData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    return data;
                }
            } catch (e) {
                console.warn('加载数据失败:', e);
            }
            return null;
        }

        // 保存数据到 localStorage
        function saveData() {
            try {
                const data = {
                    config: {
                        personA: config.personA,
                        personB: config.personB,
                        baseDate: getDateStr(config.baseDate),
                        baseInitiator: config.baseInitiator
                    },
                    overrideMap: Array.from(overrideMap.entries())
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                console.warn('保存数据失败:', e);
            }
        }

        let config = {
            personA: '我',
            personB: '同事',
            baseDate: new Date(2026, 5, 22),
            baseInitiator: 'A'
        };

        const HOLIDAYS_2026 = new Set([
            '2026-01-01','2026-01-02',
            '2026-02-17','2026-02-18','2026-02-19','2026-02-20','2026-02-21','2026-02-22','2026-02-23',
            '2026-04-06',
            '2026-05-01','2026-05-02','2026-05-03',
            '2026-06-19','2026-06-20','2026-06-21',
            '2026-09-28',
            '2026-10-01','2026-10-02','2026-10-03','2026-10-04','2026-10-05','2026-10-06','2026-10-07'
        ]);

        let overrideMap = new Map();

        let currentYear = 2026;
        let currentMonth = 6;

        let menuTargetDate = null;
        let menuTargetDateStr = null;

        function getDateStr(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function isHoliday(date) {
            const d = new Date(date);
            const day = d.getDay();
            if (day === 0 || day === 6) return true;
            const key = getDateStr(d);
            if (HOLIDAYS_2026.has(key)) return true;
            return false;
        }

        function getRawInitiator(date) {
            if (isHoliday(date)) return null;
            const base = config.baseDate;
            const diffDays = Math.floor((date - base) / (1000 * 60 * 60 * 24));
            const isEven = (diffDays % 2 === 0);
            if (config.baseInitiator === 'A') {
                return isEven ? config.personA : config.personB;
            } else {
                return isEven ? config.personB : config.personA;
            }
        }

        function getInitiatorForDate(date) {
            const dateStr = getDateStr(date);
            if (isHoliday(date)) return null;

            const overrideData = overrideMap.get(dateStr);
            if (overrideData && overrideData.override !== undefined) {
                return overrideData.override;
            }

            const base = config.baseDate;
            const target = new Date(date);
            
            if (target < base) {
                return getRawInitiator(target);
            }

            let current = new Date(base);
            let currentInitiator = getRawInitiator(base);
            const baseOverride = overrideMap.get(getDateStr(base));
            if (baseOverride && baseOverride.override !== undefined) {
                currentInitiator = baseOverride.override;
            }

            if (getDateStr(current) === dateStr) {
                return currentInitiator;
            }

            current.setDate(current.getDate() + 1);
            
            while (current <= target) {
                const curStr = getDateStr(current);
                const isHolidayToday = isHoliday(current);
                const curOverride = overrideMap.get(curStr);
                
                let actualInitiator = null;
                if (curOverride && curOverride.override !== undefined) {
                    actualInitiator = curOverride.override;
                } else if (!isHolidayToday) {
                    actualInitiator = getRawInitiator(current);
                }

                if (actualInitiator !== null) {
                    if (currentInitiator === config.personA) {
                        currentInitiator = config.personB;
                    } else if (currentInitiator === config.personB) {
                        currentInitiator = config.personA;
                    } else {
                        currentInitiator = actualInitiator;
                    }
                }

                if (curStr === dateStr) {
                    if (isHolidayToday) return null;
                    return currentInitiator;
                }

                current.setDate(current.getDate() + 1);
            }

            return null;
        }

        function renderCalendar(year, month) {
            const grid = document.getElementById('daysGrid');
            grid.innerHTML = '';

            const firstDay = new Date(year, month - 1, 1);
            const lastDay = new Date(year, month, 0);
            const daysInMonth = lastDay.getDate();
            let startWeekday = firstDay.getDay();
            let offset = (startWeekday === 0) ? 6 : startWeekday - 1;

            const prevMonthLastDay = new Date(year, month - 1, 0).getDate();
            for (let i = 0; i < offset; i++) {
                const dayNum = prevMonthLastDay - offset + i + 1;
                let m = month - 1;
                let y = year;
                if (m < 1) { m = 12; y = year - 1; }
                const dateObj = new Date(y, m - 1, dayNum);
                const cell = createCell(dayNum, true, y, m, dateObj);
                grid.appendChild(cell);
            }

            const today = new Date();
            const todayStr = getDateStr(today);

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month - 1, d);
                const dateStr = getDateStr(dateObj);
                const isToday = (dateStr === todayStr);
                const cell = createCell(d, false, year, month, dateObj, isToday);
                grid.appendChild(cell);
            }

            const totalCells = offset + daysInMonth;
            const remaining = (7 - (totalCells % 7)) % 7;
            for (let i = 1; i <= remaining; i++) {
                let m = month + 1;
                let y = year;
                if (m > 12) { m = 1; y = year + 1; }
                const dateObj = new Date(y, m - 1, i);
                const cell = createCell(i, true, y, m, dateObj);
                grid.appendChild(cell);
            }

            document.getElementById('monthLabel').textContent = `${year}年${month}月`;

            const todayDate = new Date();
            const initiator = getInitiatorForDate(todayDate);
            const todayInfo = document.getElementById('todayInfo');
            const badge = document.getElementById('todayInitiatorBadge');
            if (isHoliday(todayDate)) {
                todayInfo.textContent = '今天: 休息日';
                badge.textContent = '今天: 休息日';
            } else if (initiator) {
                todayInfo.textContent = `今天: ${initiator}`;
                badge.textContent = `今天: ${initiator}`;
            } else {
                todayInfo.textContent = '今天: 无会议';
                badge.textContent = '今天: 无会议';
            }
        }

        function createCell(dayNum, isOtherMonth, year, month, dateObj, isToday = false) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            if (isOtherMonth) cell.classList.add('other-month');

            const date = dateObj;
            const dateStr = getDateStr(date);
            const isHolidayFlag = isHoliday(date);
            const initiator = getInitiatorForDate(date);
            const override = overrideMap.get(dateStr);

            const numberSpan = document.createElement('div');
            numberSpan.className = 'day-number';
            numberSpan.textContent = dayNum;
            cell.appendChild(numberSpan);

            if (isHolidayFlag) {
                const badge = document.createElement('span');
                badge.className = 'initials holiday-badge';
                badge.textContent = '🚫休';
                cell.appendChild(badge);
            } else if (initiator) {
                const initSpan = document.createElement('span');
                initSpan.className = 'initials';
                if (initiator === config.personA) {
                    initSpan.style.background = '#d4e3f5';
                    initSpan.style.color = '#0b3a5e';
                } else {
                    initSpan.style.background = '#d4f0e3';
                    initSpan.style.color = '#0a5e3a';
                }
                initSpan.textContent = initiator;
                cell.appendChild(initSpan);
            } else {
                const emptySpan = document.createElement('span');
                emptySpan.className = 'initials';
                emptySpan.textContent = '—';
                cell.appendChild(emptySpan);
            }

            if (override) {
                if (override.override === null && !isHolidayFlag) {
                    const badge = document.createElement('span');
                    badge.className = 'status-badge cancelled';
                    badge.textContent = '取消';
                    cell.appendChild(badge);
                } else if (override.override !== null && override.override !== undefined && !isHolidayFlag) {
                    const badge = document.createElement('span');
                    badge.className = 'status-badge modified';
                    badge.textContent = '修改';
                    cell.appendChild(badge);
                }
            }

            if (isToday) cell.classList.add('today');

            cell.addEventListener('click', function(e) {
                e.stopPropagation();
                showPopupMenu(e, dateStr, date);
            });

            return cell;
        }

        const popupMenu = document.getElementById('popupMenu');

        function showPopupMenu(event, dateStr, date) {
            menuTargetDate = date;
            menuTargetDateStr = dateStr;
            const rect = event.target ? event.target.getBoundingClientRect() : { left: 0, top: 0 };
            const x = event.clientX || rect.left + rect.width/2;
            const y = event.clientY || rect.top - 10;

            popupMenu.style.display = 'block';
            let left = x - 75;
            let top = y - 10;
            if (left < 10) left = 10;
            if (top < 10) top = 10;
            if (left + 150 > window.innerWidth - 10) left = window.innerWidth - 160;
            if (top + 120 > window.innerHeight - 10) top = window.innerHeight - 130;
            popupMenu.style.left = left + 'px';
            popupMenu.style.top = top + 'px';

            const isHolidayFlag = isHoliday(date);
            const cancelItem = document.getElementById('menuCancel');
            const changeItem = document.getElementById('menuChange');
            if (isHolidayFlag) {
                cancelItem.style.opacity = '0.4';
                cancelItem.style.pointerEvents = 'none';
                changeItem.style.opacity = '0.4';
                changeItem.style.pointerEvents = 'none';
            } else {
                cancelItem.style.opacity = '1';
                cancelItem.style.pointerEvents = 'auto';
                changeItem.style.opacity = '1';
                changeItem.style.pointerEvents = 'auto';
            }
        }

        function hidePopupMenu() {
            popupMenu.style.display = 'none';
            menuTargetDate = null;
            menuTargetDateStr = null;
        }

        function handleCancel() {
            if (!menuTargetDateStr) return;
            const dateStr = menuTargetDateStr;
            if (isHoliday(new Date(menuTargetDate))) {
                alert('休息日不可取消');
                hidePopupMenu();
                return;
            }
            const override = overrideMap.get(dateStr);
            if (override && override.override === null) {
                overrideMap.delete(dateStr);
            } else {
                overrideMap.set(dateStr, { override: null });
            }
            saveData();
            hidePopupMenu();
            renderCalendar(currentYear, currentMonth);
        }

        function handleChange() {
            if (!menuTargetDateStr) return;
            const dateStr = menuTargetDateStr;
            const date = menuTargetDate;
            if (isHoliday(date)) {
                alert('休息日不可更改发起人');
                hidePopupMenu();
                return;
            }
            const current = getInitiatorForDate(date);
            const choice = prompt(
                `选择 ${dateStr} 的发起人:\n1. ${config.personA}\n2. ${config.personB}\n(输入1或2)`,
                current === config.personA ? '1' : '2'
            );
            if (choice === null) { hidePopupMenu(); return; }
            let selected = null;
            if (choice === '1') selected = config.personA;
            else if (choice === '2') selected = config.personB;
            else { alert('无效输入'); hidePopupMenu(); return; }

            overrideMap.set(dateStr, { override: selected });
            saveData();
            hidePopupMenu();
            renderCalendar(currentYear, currentMonth);
        }

        function handleReset() {
            if (!menuTargetDateStr) return;
            const dateStr = menuTargetDateStr;
            if (overrideMap.has(dateStr)) {
                overrideMap.delete(dateStr);
                saveData();
                hidePopupMenu();
                renderCalendar(currentYear, currentMonth);
            } else {
                alert('该日期无特殊设置');
                hidePopupMenu();
            }
        }

        function resetToday() {
            const today = new Date();
            const todayStr = getDateStr(today);
            if (overrideMap.has(todayStr)) {
                overrideMap.delete(todayStr);
                saveData();
                renderCalendar(currentYear, currentMonth);
            } else {
                alert('今日无特殊状态');
            }
        }

        function openSettings() {
            document.getElementById('personAInput').value = config.personA;
            document.getElementById('personBInput').value = config.personB;
            document.getElementById('baseDateInput').value = getDateStr(config.baseDate);
            document.getElementById('baseInitiatorSelect').value = config.baseInitiator;
            document.getElementById('settingsModal').classList.add('active');
        }
        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }
        function saveSettings() {
            const newA = document.getElementById('personAInput').value.trim() || '我';
            const newB = document.getElementById('personBInput').value.trim() || '同事';
            const baseDateVal = document.getElementById('baseDateInput').value;
            const baseInitiator = document.getElementById('baseInitiatorSelect').value;
            if (!baseDateVal) { alert('请选择基准日期。'); return; }
            const parts = baseDateVal.split('-').map(Number);
            const newBase = new Date(parts[0], parts[1]-1, parts[2]);
            config.personA = newA;
            config.personB = newB;
            config.baseDate = newBase;
            config.baseInitiator = baseInitiator;
            overrideMap.clear();
            saveData();
            closeSettings();
            renderCalendar(currentYear, currentMonth);
        }

        // ----- 初始化加载数据 -----
        function initData() {
            const saved = loadData();
            if (saved) {
                // 加载配置
                const cfg = saved.config;
                if (cfg) {
                    config.personA = cfg.personA || '我';
                    config.personB = cfg.personB || '同事';
                    if (cfg.baseDate) {
                        const parts = cfg.baseDate.split('-').map(Number);
                        config.baseDate = new Date(parts[0], parts[1]-1, parts[2]);
                    }
                    config.baseInitiator = cfg.baseInitiator || 'A';
                }
                // 加载覆盖数据
                if (saved.overrideMap && Array.isArray(saved.overrideMap)) {
                    overrideMap = new Map(saved.overrideMap);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            // 先加载数据
            initData();
            
            currentYear = 2026;
            currentMonth = 6;

            document.getElementById('menuCancel').addEventListener('click', handleCancel);
            document.getElementById('menuChange').addEventListener('click', handleChange);
            document.getElementById('menuReset').addEventListener('click', handleReset);

            document.addEventListener('click', function(e) {
                if (!popupMenu.contains(e.target)) {
                    hidePopupMenu();
                }
            });

            renderCalendar(currentYear, currentMonth);

            document.getElementById('prevMonth').addEventListener('click', function() {
                if (currentMonth === 1) { currentMonth = 12; currentYear--; }
                else { currentMonth--; }
                renderCalendar(currentYear, currentMonth);
            });
            document.getElementById('nextMonth').addEventListener('click', function() {
                if (currentMonth === 12) { currentMonth = 1; currentYear++; }
                else { currentMonth++; }
                renderCalendar(currentYear, currentMonth);
            });

            document.getElementById('resetTodayBtn').addEventListener('click', resetToday);
            document.getElementById('settingsBtn').addEventListener('click', openSettings);
            document.getElementById('closeSettingsBtn').addEventListener('click', closeSettings);
            document.getElementById('saveSettingsBtn').addEventListener('click', saveSettings);
            document.getElementById('settingsModal').addEventListener('click', function(e) {
                if (e.target === this) closeSettings();
            });
        });
    })();
</script>
</body>
</html>
