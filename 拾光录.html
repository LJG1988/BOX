<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>LJG*日日皆过往</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --pri: #1a3a3a; --pri-d: #0d1f1f; --sec: #c9a227; --sec-l: #e8d179;
            --acc: #8b4513; --bg: #0a1515; --card: rgba(26, 58, 58, 0.7);
            --bdr: rgba(201, 162, 39, 0.3); --txt: #f5f0e8; --txt-l: #a09080;
            --sh: 0 4px 20px rgba(0, 0, 0, 0.4); --glow: 0 0 12px rgba(201, 162, 39, 0.4);
            --orange: #e8863a;
        }
        html, body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); min-height: 100vh; color: var(--txt); overflow-x: hidden; }
        .bg-deco { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; background: radial-gradient(ellipse at 20% 80%, rgba(201, 162, 39, .08) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(139, 69, 19, .08) 0%, transparent 50%), linear-gradient(180deg, #0a1515, #1a2a2a 50%, #0a1515); }
        .lantern { position: absolute; width: 28px; height: 36px; background: linear-gradient(180deg, #c9a227, #8b4513); border-radius: 14px 14px 7px 7px; opacity: .55; animation: lfloat 4s ease-in-out infinite; box-shadow: 0 0 12px rgba(201, 162, 39, .5); }
        .lantern::before { content: ''; position: absolute; top: -5px; left: 50%; transform: translateX(-50%); width: 14px; height: 5px; background: #5c3317; border-radius: 2px; }
        .lantern::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); width: 2px; height: 6px; background: #c9a227; }
        @keyframes lfloat { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-10px) rotate(1deg); } }
        .steam { position: absolute; width: 90px; height: 90px; background: radial-gradient(circle, rgba(255, 255, 255, .04) 0%, transparent 70%); border-radius: 50%; animation: rise 8s ease-in-out infinite; }
        @keyframes rise { 0%,100% { transform: translateY(0) scale(1); opacity: .3; } 50% { transform: translateY(-25px) scale(1.2); opacity: .1; } }
        .susuwatari { position: absolute; width: 20px; height: 20px; border-radius: 50%; background: radial-gradient(circle at 40% 35%, #555, #111); opacity: .4; animation: susu 6s ease-in-out infinite; }
        .susuwatari::before, .susuwatari::after { content: ''; position: absolute; width: 5px; height: 6px; background: #fff; border-radius: 50%; top: 5px; }
        .susuwatari::before { left: 4px; } .susuwatari::after { right: 4px; }
        @keyframes susu { 0%,100% { transform: translate(0,0); } 25% { transform: translate(15px, -20px); } 50% { transform: translate(-10px, -35px); } 75% { transform: translate(20px, -15px); } }
        .app { position: relative; z-index: 1; max-width: 100%; margin: 0 auto; min-height: 100vh; padding-bottom: 78px; }
        .hdr { background: linear-gradient(180deg, var(--pri), var(--pri-d)); color: var(--sec); padding: 14px 20px; text-align: center; position: relative; border-bottom: 2px solid var(--bdr); box-shadow: var(--sh); }
        .hdr h1 { font-size: 20px; font-weight: 700; letter-spacing: 4px; text-shadow: 0 0 12px rgba(201, 162, 39, .5); }
        .search-area { padding: 10px 15px; position: relative; display: flex; gap: 8px; }
        .search-area input { flex: 1; padding: 10px 14px; border: 1px solid var(--bdr); border-radius: 20px; background: var(--card); color: var(--txt); font-size: 13px; box-shadow: var(--sh); }
        .search-area input:focus { outline: none; border-color: var(--sec); box-shadow: var(--glow); }
        .search-results { position: absolute; top: 100%; left: 15px; right: 15px; background: var(--card); border: 1px solid var(--bdr); border-radius: 12px; box-shadow: var(--glow); z-index: 50; max-height: 300px; overflow-y: auto; display: none; backdrop-filter: blur(8px); }
        .search-results.show { display: block; }
        .search-item { padding: 10px 14px; border-bottom: 1px solid rgba(201, 162, 39, .1); cursor: pointer; }
        .search-item:active { background: rgba(201, 162, 39, .15); }
        .search-item .si-date { font-size: 11px; color: var(--sec); }
        .search-item .si-text { font-size: 12px; color: var(--txt-l); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .search-bar-cd { padding: 10px 15px; position: relative; display: none; }
        .search-bar-cd.active { display: block; }
        .search-bar-cd input { width: 100%; padding: 10px 14px; border: 1px solid var(--bdr); border-radius: 20px; background: var(--card); color: var(--txt); font-size: 13px; box-shadow: var(--sh); }
        .pg-wrap { padding: 12px 15px; min-height: calc(100vh - 130px); }
        .pg { display: none; } .pg.on { display: block; }
        .cal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 4px; }
        .cal-hdr h2 { font-size: 15px; color: var(--sec); }
        .cal-nav { display: flex; gap: 8px; }
        .cal-nav button { background: var(--card); border: 1px solid var(--bdr); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 13px; color: var(--sec); transition: .2s; }
        .cal-nav button:active { background: var(--sec); color: var(--pri-d); transform: scale(1.1); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: var(--card); padding: 10px; border-radius: 20px; backdrop-filter: blur(4px); border: 1px solid var(--bdr); }
        .wk { text-align: center; font-size: 10px; color: var(--sec); padding: 5px 0; font-weight: 500; }
        .cal-day { height: 45px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; transition: .2s; background: rgba(0, 0, 0, .2); border: 1px solid transparent; }
        .cal-day:active { background: rgba(201, 162, 39, .2); border-color: var(--bdr); }
        .cal-day.om { color: var(--txt-l); opacity: .4; }
        .cal-day.today { background: linear-gradient(135deg, var(--sec), var(--acc)); color: var(--pri-d); font-weight: 600; box-shadow: var(--glow); }
        .cal-day.has { background: linear-gradient(135deg, rgba(201, 162, 39, .25), rgba(139, 69, 19, .25)); border: 1px solid var(--bdr); }
        .cal-day .dn { font-size: 12px; font-weight: 500; } .cal-day .mi { font-size: 13px; margin-top: 1px; }
        .fab { position: fixed; bottom: 88px; right: 14px; width: 54px; height: 54px; border-radius: 50%; border: 2px solid var(--sec); background: linear-gradient(135deg, #2a2a2a, #111); color: var(--sec); font-size: 22px; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 0, 0, .4), 0 0 10px rgba(201, 162, 39, .3); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .fab:active { transform: scale(1.08); }
        .fab.hide-fab { display: none; }
        .editor { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: none; flex-direction: column; }
        .editor.on { display: flex; }
        .ed-hdr { background: linear-gradient(180deg, var(--pri), var(--pri-d)); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--bdr); }
        .ed-hdr button { background: rgba(201, 162, 39, .2); border: 1px solid var(--bdr); color: var(--sec); padding: 7px 13px; border-radius: 24px; cursor: pointer; }
        .ed-body { flex: 1; padding: 15px; overflow-y: auto; }
        .ed-date { text-align: center; color: var(--sec); margin-bottom: 12px; font-size: 14px; }
        .mood-sel { display: flex; justify-content: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
        .mood-opt { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; background: var(--card); border: 1px solid var(--bdr); transition: .2s; }
        .mood-opt.sel { background: linear-gradient(135deg, var(--sec), var(--acc)); transform: scale(1.12); box-shadow: var(--glow); }
        .mood-tip { text-align: center; font-size: 12px; color: var(--sec); margin-bottom: 12px; }
        .ed-ta { width: 100%; min-height: 280px; border: 1px solid var(--bdr); border-radius: 18px; padding: 14px; background: var(--card); color: var(--txt); font-family: inherit; line-height: 1.6; font-size: 15px; }
        .ed-ta:focus { outline: none; border-color: var(--sec); }
        .media-prev { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .media-wrap { position: relative; width: 80px; height: 80px; cursor: pointer; }
        .media-wrap img, .media-wrap video { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; border: 1px solid var(--bdr); background: #000; }
        .media-del { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: #f44336; color: white; border: none; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .ed-toolbar { display: flex; gap: 15px; margin-top: 14px; justify-content: center; }
        .tb-btn { width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--bdr); background: var(--card); cursor: pointer; font-size: 20px; color: var(--sec); }
        .tb-btn.rec { background: rgba(244, 67, 54, .4); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(244,67,54,.4); } 50% { box-shadow: 0 0 0 8px rgba(244,67,54,0); } }
        .del-entry-btn, .edit-mode-btn { background: rgba(201, 162, 39, 0.2); border: 1px solid var(--bdr); color: var(--sec); border-radius: 24px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
        .del-entry-btn:active, .edit-mode-btn:active { background: var(--sec); color: var(--pri-d); }
        .image-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .image-modal.on { display: flex; }
        .image-modal img, .image-modal video { max-width: 95%; max-height: 80%; object-fit: contain; border-radius: 12px; }
        .image-modal-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; cursor: pointer; }
        .cd-list { display: flex; flex-direction: column; gap: 6px; }
        .cd-card { background: var(--card); backdrop-filter: blur(8px); padding: 8px 12px; border: 1px solid var(--bdr); border-radius: 16px; transition: 0.1s; cursor: pointer; }
        .cd-card.highlight { background: rgba(201, 162, 39, 0.4); border-color: var(--sec); box-shadow: var(--glow); animation: flash 0.5s ease; }
        @keyframes flash { 0% { background: rgba(201,162,39,0.8); } 100% { background: rgba(201,162,39,0.2); } }
        .cd-header { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .cd-title { font-size: 14px; font-weight: 700; color: var(--sec-l); flex: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cd-stats { display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
        .days-stat, .years-stat { display: flex; align-items: baseline; gap: 3px; background: rgba(0, 0, 0, 0.35); padding: 2px 10px; border-radius: 24px; }
        .days-number { font-size: 18px; font-weight: 800; color: var(--sec); }
        .days-label { font-size: 9px; color: #ddc; }
        .years-number { font-size: 16px; font-weight: 700; color: var(--orange); }
        .years-label { font-size: 8px; color: var(--txt-l); }
        .add-cd { width: 100%; padding: 12px; background: var(--card); border: 1.5px dashed var(--bdr); border-radius: 32px; color: var(--sec); font-size: 13px; margin-top: 12px; cursor: pointer; text-align: center; }
        .context-menu { position: fixed; background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--sec); border-radius: 28px; padding: 8px 0; z-index: 400; box-shadow: var(--glow); min-width: 140px; display: none; flex-direction: column; }
        .context-menu button { background: none; border: none; padding: 12px 20px; text-align: left; color: var(--txt); font-size: 14px; cursor: pointer; width: 100%; }
        .context-menu button:active { background: rgba(201, 162, 39, 0.3); }
        .context-menu .danger { color: #f44336; }
        .st-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px; }
        .st-card { background: var(--card); border-radius: 18px; padding: 8px 6px; text-align: center; backdrop-filter: blur(4px); border: 1px solid var(--bdr); }
        .st-card .num { font-size: 18px; font-weight: 700; color: var(--sec); }
        .st-card .lbl { font-size: 10px; color: var(--txt-l); margin-top: 2px; }
        .year-cal-section, .mood-stats-section, .set-sec { background: var(--card); border-radius: 26px; padding: 14px; margin-bottom: 14px; backdrop-filter: blur(4px); border: 1px solid var(--bdr); }
        .year-cal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .mini-month { background: rgba(0,0,0,.2); border-radius: 14px; padding: 6px; }
        .mini-month .mm-title { font-size: 10px; color: var(--sec); text-align: center; margin-bottom: 4px; }
        .mini-month .mm-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
        .mini-month .mm-day { font-size: 8px; text-align: center; cursor: pointer; color: var(--txt-l); padding: 2px 0; border-radius: 4px; display: flex; align-items: center; justify-content: center; gap: 1px; }
        .mini-month .mm-day.has-entry { background: var(--orange); color: #fff; font-weight: 600; }
        .mood-stats-list { margin-top: 8px; }
        .mood-stat-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--bdr); }
        .mood-stat-name { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .mood-stat-count { font-size: 14px; font-weight: 600; color: var(--sec); }
        .mood-advice { background: rgba(201,162,39,0.1); border-radius: 16px; padding: 12px; margin-top: 12px; font-size: 12px; line-height: 1.5; color: var(--txt-l); border-left: 3px solid var(--sec); }
        .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, .85); display: none; align-items: center; justify-content: center; z-index: 300; padding: 20px; }
        .modal.on { display: flex; }
        .modal-c { background: var(--card); backdrop-filter: blur(12px); border-radius: 38px; padding: 22px; width: 100%; max-width: 340px; border: 1px solid var(--bdr); }
        .fg { margin-bottom: 14px; }
        .fg label { display: block; font-size: 12px; margin-bottom: 5px; color: var(--txt-l); }
        .fg input, .fg select, .fg textarea { width: 100%; padding: 10px; border-radius: 22px; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--bdr); color: var(--txt); }
        .s-btn { width: 100%; padding: 10px; border-radius: 32px; cursor: pointer; margin-top: 6px; font-weight: 500; }
        .s-btn.pri { background: linear-gradient(135deg, var(--sec), var(--acc)); color: var(--pri-d); border: none; }
        .s-btn.sec { background: rgba(255,255,255,0.08); border: 1px solid var(--bdr); color: var(--txt); }
        .bnav { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(180deg, var(--pri), var(--pri-d)); display: flex; backdrop-filter: blur(10px); border-top: 1px solid var(--bdr); padding: 6px 0; z-index: 100; }
        .ni { flex: 1; display: flex; flex-direction: column; align-items: center; background: none; border: none; color: var(--txt-l); cursor: pointer; padding: 4px; }
        .ni.on { color: var(--sec); }
        .ni .ic { font-size: 20px; margin-bottom: 2px; }
        .hidden { display: none; }
        .loading-tip { position: fixed; bottom: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: var(--sec); padding: 12px 24px; border-radius: 40px; z-index: 500; font-size: 14px; display: none; backdrop-filter: blur(8px); }
        .backup-info { font-size: 11px; color: var(--txt-l); margin-top: 8px; text-align: center; }
        .mm-day.has-entry .mm-icon { font-size: 7px; }

        /* 新增：当月日记聚合视图样式 */
        .month-aggregate { background: var(--card); border-radius: 26px; padding: 12px 0; margin-top: 12px; border: 1px solid var(--bdr); backdrop-filter: blur(4px); }
        .month-aggregate .agg-header { display: flex; justify-content: space-between; align-items: center; padding: 0 14px 10px 14px; border-bottom: 1px solid var(--bdr); }
        .month-aggregate .agg-header h3 { font-size: 15px; color: var(--sec); }
        .month-aggregate .agg-header .agg-nav button { background: transparent; border: 1px solid var(--bdr); color: var(--sec); width: 26px; height: 26px; border-radius: 50%; cursor: pointer; font-size: 12px; }
        .month-aggregate .agg-list { padding: 6px 10px; max-height: 500px; overflow-y: auto; }
        .agg-item { display: flex; flex-direction: column; gap: 4px; padding: 10px 6px; border-bottom: 1px solid rgba(201,162,39,0.12); }
        .agg-item:last-child { border-bottom: none; }
        .agg-item .agg-date { font-size: 13px; font-weight: 600; color: var(--sec-l); display: flex; align-items: center; gap: 6px; }
        .agg-item .agg-date .weekday { font-weight: 400; font-size: 11px; color: var(--txt-l); }
        .agg-item .agg-content { font-size: 13px; line-height: 1.5; color: var(--txt); white-space: pre-wrap; word-break: break-word; }
        .agg-item .agg-media { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
        .agg-item .agg-media .agg-thumb { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; border: 1px solid var(--bdr); cursor: pointer; transition: 0.2s; background: #111; }
        .agg-item .agg-media .agg-thumb:active { transform: scale(0.95); }
        .agg-empty { text-align: center; padding: 28px 0; color: var(--txt-l); font-size: 13px; }
        .agg-password-modal .modal-c { max-width: 300px; }
        .agg-password-modal .fg { margin-bottom: 8px; }
        .toggle-stat-btn { margin-top: 8px; background: rgba(201,162,39,0.15); border: 1px solid var(--bdr); color: var(--sec); border-radius: 24px; padding: 8px 14px; font-size: 12px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
<div class="bg-deco"><div class="lantern" style="top:7%;left:7%"></div><div class="lantern" style="top:14%;right:9%"></div><div class="steam" style="bottom:18%;left:18%"></div><div class="susuwatari" style="top:25%;left:15%"></div></div>
<div class="app">
    <div class="hdr"><h1>LJG*拾光录</h1></div>
    <div class="search-area" id="search-area"><input type="text" id="search-input" placeholder="🔍 搜索日记内容..." oninput="searchDiary()"><div class="search-results" id="search-results"></div></div>
    <div class="search-bar-cd" id="search-bar-cd"><input type="text" id="cd-search-input" placeholder="🔍 搜索纪念日名称..." oninput="searchCD()"></div>
    <div class="pg-wrap">
        <div class="pg on" id="pg-cal">
            <div class="cal-hdr"><h2 id="cal-month">2026年6月</h2><div class="cal-nav"><button onclick="chgMonth(-1)">◀</button><button onclick="chgMonth(1)">▶</button></div></div>
            <div class="cal-grid" id="cal-grid"></div>
            <!-- 当月日记聚合视图 (默认隐藏) -->
            <div id="monthAggregateWrapper" style="display:none;">
                <div class="month-aggregate" id="monthAggregate">
                    <div class="agg-header"><h3>📅 当月日记</h3><div class="agg-nav"><button onclick="changeAggMonth(-1)">◀</button><span id="aggMonthLabel" style="font-size:13px;color:var(--txt-l);margin:0 8px;"></span><button onclick="changeAggMonth(1)">▶</button></div></div>
                    <div class="agg-list" id="aggList"></div>
                </div>
            </div>
        </div>
        <div class="pg" id="pg-cd"><div class="cd-list" id="cd-list"></div><button class="add-cd" onclick="openCdModal()">+ 添加纪念日</button></div>
        <div class="pg" id="pg-st">
            <div class="st-grid">
                <div class="st-card"><div class="num" id="s-total">0</div><div class="lbl">日记总数</div></div>
                <div class="st-card"><div class="num" id="s-chars">0</div><div class="lbl">日记总字数</div></div>
                <div class="st-card"><div class="num" id="s-month">0</div><div class="lbl">本月日记</div></div>
                <div class="st-card"><div class="num" id="s-photo">0</div><div class="lbl">照片/视频</div></div>
            </div>
            <div class="year-cal-section"><h3>📆 年度日历</h3><div class="year-cal-grid" id="year-cal-grid"></div></div>
            <div class="mood-stats-section"><h3>📊 喜怒哀乐·近一年心情统计</h3><div id="mood-stats-area"></div></div>
        </div>
        <div class="pg" id="pg-set">
            <div class="set-sec">
                <h3>💾 数据备份（含照片视频）</h3>
                <button class="s-btn pri" onclick="exportFullBackup()">📦 导出完整备份ZIP包</button>
                <div class="backup-info">💡 导出一个包含所有日记和照片的ZIP文件，保存到手机后，可通过飞牛App上传到NAS保管</div>
                <div style="height: 12px;"></div>
                <button class="s-btn sec" onclick="openImportFile()">📂 选择备份文件恢复</button>
                <input type="file" id="import-file" accept=".zip" style="display:none;" onchange="importZipFile(this)">
                <div class="backup-info">💡 选择之前导出的ZIP备份文件，恢复所有日记和照片</div>
            </div>
            <div class="set-sec">
                <h3>📖 日记统计视图</h3>
                <button class="toggle-stat-btn" id="toggleAggBtn" onclick="toggleAggregate()">🔓 打开日记统计 (需密码)</button>
                <div class="backup-info" style="margin-top:4px;">开启后可在日记页查看当月日记聚合</div>
            </div>
            <div class="set-sec">
                <h3>🗑️ 危险操作</h3>
                <button class="s-btn sec" onclick="clearAll()" style="color:#f44336;">清空所有数据</button>
            </div>
        </div>

// ==================== IndexedDB 媒体存储 ====================
let db = null;
const DB_NAME = 'LJG_MediaDB';
const STORE_NAME = 'media';
const DB_VERSION = 2;

function openDB() {
    return new Promise((resolve, reject) => {
        if (db && db.name === DB_NAME) { resolve(db); return; }
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => { db = request.result; resolve(db); };
        request.onupgradeneeded = (event) => {
            const dbRef = event.target.result;
            if (!dbRef.objectStoreNames.contains(STORE_NAME)) {
                dbRef.createObjectStore(STORE_NAME, { keyPath: 'id' });
            }
        };
    });
}

async function saveMediaToDB(mediaId, file, type) {
    const dbRef = await openDB();
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function() {
            const base64Data = reader.result;
            const tx = dbRef.transaction([STORE_NAME], 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            let mimeType = type || file.type || 'image/jpeg';
            const request = store.put({ 
                id: mediaId, 
                data: base64Data, 
                type: mimeType, 
                timestamp: Date.now() 
            });
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        };
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
    });
}

async function loadMediaFromDB(mediaId) {
    const dbRef = await openDB();
    return new Promise((resolve, reject) => {
        const tx = dbRef.transaction([STORE_NAME], 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.get(mediaId);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}

async function deleteMediaFromDB(mediaId) {
    const dbRef = await openDB();
    return new Promise((resolve, reject) => {
        const tx = dbRef.transaction([STORE_NAME], 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const request = store.delete(mediaId);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
    });
}

async function getAllMedia() {
    const dbRef = await openDB();
    return new Promise((resolve, reject) => {
        const tx = dbRef.transaction([STORE_NAME], 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.getAll();
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}

async function clearAllMedia() {
    const dbRef = await openDB();
    return new Promise((resolve, reject) => {
        const tx = dbRef.transaction([STORE_NAME], 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const request = store.clear();
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
    });
}

function base64ToBlob(base64, mimeType) {
    const byteString = atob(base64.split(',')[1]);
    const ab = new ArrayBuffer(byteString.length);
    const ia = new Uint8Array(ab);
    for (let i = 0; i < byteString.length; i++) {
        ia[i] = byteString.charCodeAt(i);
    }
    return new Blob([ab], { type: mimeType });
}

// ==================== 农历库 ====================
const lunarInfo = [0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x05ac0,0x0ab60,0x096d5,0x092e0,0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,0x14b63];

function lYearDays(y) { let s=348; for(let i=0x8000;i>0x8;i>>=1) s+=(lunarInfo[y-1900]&i)?1:0; return s+leapDays(y); }
function leapMonth(y) { return lunarInfo[y-1900]&0xf; }
function leapDays(y) { return leapMonth(y)?((lunarInfo[y-1900]&0x10000)?30:29):0; }
function monthDays(y,m) { return (lunarInfo[y-1900]&(0x10000>>m))?30:29; }

function solarToLunar(year, month, day) {
    let baseDate = new Date(1900, 0, 31);
    let targetDate = new Date(year, month - 1, day);
    let offset = Math.floor((targetDate - baseDate) / 86400000);
    let lunarYear = 1900;
    let daysInLunarYear = lYearDays(lunarYear);
    while (offset >= daysInLunarYear) {
        offset -= daysInLunarYear;
        lunarYear++;
        daysInLunarYear = lYearDays(lunarYear);
    }
    let lunarMonth = 1;
    let leap = leapMonth(lunarYear);
    let isLeapMonth = false;
    for (let i = 1; i <= 12; i++) {
        let daysInMonth;
        if (leap > 0 && i === leap + 1 && !isLeapMonth) {
            daysInMonth = leapDays(lunarYear);
            isLeapMonth = true;
            i--;
        } else {
            daysInMonth = monthDays(lunarYear, i);
        }
        if (offset < daysInMonth) {
            lunarMonth = i;
            break;
        }
        offset -= daysInMonth;
        if (leap > 0 && i === leap && !isLeapMonth) {
            i++;
        }
    }
    let lunarDay = offset + 1;
    return { year: lunarYear, month: lunarMonth, day: lunarDay };
}

function lunarToSolar(lYear, lMonth, lDay) { 
    let offset=0; 
    for(let i=1900;i<lYear;i++) offset+=lYearDays(i); 
    let leap=leapMonth(lYear),isAdd=false; 
    for(let i=1;i<lMonth;i++) { 
        if(!isAdd&&leap>0&&i===leap) { 
            offset+=leapDays(lYear); 
            isAdd=true; 
        } 
        offset+=monthDays(lYear,i); 
    } 
    offset+=lDay-1; 
    let base=new Date(1900,0,31); 
    let res=new Date(base.getTime()+offset*86400000); 
    return {year:res.getFullYear(),month:res.getMonth()+1,day:res.getDate()}; 
}

function getLunarDateInYear(targetYear, lunarMonth, lunarDay) {
    let startDate = new Date(targetYear, 0, 1);
    let endDate = new Date(targetYear + 1, 0, 1);
    let current = new Date(startDate);
    while (current < endDate) {
        let lunar = solarToLunar(
            current.getFullYear(),
            current.getMonth() + 1,
            current.getDate()
        );
        if (lunar.month === lunarMonth && lunar.day === lunarDay) {
            return {
                year: current.getFullYear(),
                month: current.getMonth() + 1,
                day: current.getDate()
            };
        }
        current.setDate(current.getDate() + 1);
    }
    return { year: targetYear, month: 1, day: 1 };
}

async function handleMedia(ev){ 
    let files=ev.target.files; 
    if(!files || files.length===0) return; 
    let loading=document.getElementById('loadingTip'); 
    loading.style.display='block'; 
    loading.textContent = '⏳ 正在上传...';

        for(let f of files){

            await saveMediaToDB(mediaId, f, mimeType);

        }

    } catch(e){ 
        console.error('上传失败:', e);
        alert('上传失败：'+e.message); 
    } finally{ 
        loading.style.display='none'; 
        document.getElementById('media-input').value='';

        let m=tempMediaList[i];

            let data=await loadMediaFromDB(m.id);

                let displayType = m.type || (data.type ? (data.type.startsWith('video') ? 'video' : 'image') : 'image');

                } else {

                }

            html+=`<div class="media-wrap"><div style="width:80px;height:80px;background:#333;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;">❌</div><button class="media-del" onclick="removeMedia(${i});event.stopPropagation()">×</button></div>`;

async function toggleRec(){
    if(!isEditMode)return;
    if(recording){
        if(recorder)recorder.stop();
        recording=false;
        document.getElementById('rec-btn').classList.remove('rec');
        return;
    }
    try{
        const s=await navigator.mediaDevices.getUserMedia({audio:true});
        recorder=new MediaRecorder(s);
        audioChunks=[];
        recorder.ondataavailable=e=>{if(e.data.size)audioChunks.push(e.data);};
        recorder.onstop=async()=>{
            try {
                let blob=new Blob(audioChunks,{type:'audio/webm'}); 
                let mediaId=Date.now()+'_audio_'+Math.random().toString(36).substr(2,6); 
                await saveMediaToDB(mediaId, blob, 'audio/webm'); 
                tempMediaList.push({id:mediaId,type:'audio',mime:'audio/webm'}); 
                await renderMediaPreview(); 
                s.getTracks().forEach(t=>t.stop());
            } catch(e) {
                console.error('录音保存失败:', e);
            }
        };
        recorder.start();
        recording=true;
        document.getElementById('rec-btn').classList.add('rec');
    }catch(e){
        alert('无法获取麦克风权限');
    }
}

function getCountdownInfo(type, data) {
    let today = new Date();
    today.setHours(0, 0, 0, 0);
    let startYear, targetDate;
    if (type === 'solar') {
        let parts = data.date.split('-');
        let month = parseInt(parts[1]), day = parseInt(parts[2]);
        startYear = parseInt(parts[0]);
        let thisYearDate = new Date(today.getFullYear(), month - 1, day);
        thisYearDate.setHours(0, 0, 0, 0);
        if (thisYearDate < today) {
            targetDate = new Date(today.getFullYear() + 1, month - 1, day);
        } else {
            targetDate = thisYearDate;
        }
        targetDate.setHours(0, 0, 0, 0);
    } else {
        let lunarMonth = data.lunarMonth;
        let lunarDay = data.lunarDay;
        startYear = data.lunarYear;
        let checkDate = new Date(today);
        checkDate.setHours(0, 0, 0, 0);
        let maxDays = 366;
        let foundDate = null;
        for (let i = 0; i < maxDays; i++) {
            let checkYear = checkDate.getFullYear();
            let checkMonth = checkDate.getMonth() + 1;
            let checkDay = checkDate.getDate();
            let lunar = solarToLunar(checkYear, checkMonth, checkDay);
            if (lunar.month === lunarMonth && lunar.day === lunarDay) {
                foundDate = new Date(checkDate);
                foundDate.setHours(0, 0, 0, 0);
                break;
            }
            checkDate.setDate(checkDate.getDate() + 1);
        }
        if (foundDate) {
            targetDate = foundDate;
        } else {
            let thisYearSolar = getLunarDateInYear(today.getFullYear(), lunarMonth, lunarDay);
            let thisYearDate = new Date(thisYearSolar.year, thisYearSolar.month - 1, thisYearSolar.day);
            thisYearDate.setHours(0, 0, 0, 0);
            if (thisYearDate < today) {
                let nextYearSolar = getLunarDateInYear(today.getFullYear() + 1, lunarMonth, lunarDay);
                targetDate = new Date(nextYearSolar.year, nextYearSolar.month - 1, nextYearSolar.day);
            } else {
                targetDate = thisYearDate;
            }
            targetDate.setHours(0, 0, 0, 0);
        }
    }
    let timeDiff = targetDate.getTime() - today.getTime();
    let diffDays = Math.ceil(timeDiff / 86400000);
    if (diffDays < 0) diffDays = 0;
    let yearsPassed = today.getFullYear() - startYear;
    if (yearsPassed < 0) yearsPassed = 0;
    if (type === 'lunar') {
        let thisYearCheck = new Date(today.getFullYear(), 0, 1);
        let foundThisYear = null;
        for (let i = 0; i < 366; i++) {
            let checkYear = thisYearCheck.getFullYear();
            let checkMonth = thisYearCheck.getMonth() + 1;
            let checkDay = thisYearCheck.getDate();
            let lunar = solarToLunar(checkYear, checkMonth, checkDay);
            if (lunar.month === data.lunarMonth && lunar.day === data.lunarDay) {
                foundThisYear = new Date(thisYearCheck);
                foundThisYear.setHours(0, 0, 0, 0);
                break;
            }
            thisYearCheck.setDate(thisYearCheck.getDate() + 1);
        }
        if (foundThisYear && foundThisYear > today) {
            yearsPassed = Math.max(0, yearsPassed - 1);
        }
    } else {
        let parts = data.date.split('-');
        let month = parseInt(parts[1]), day = parseInt(parts[2]);
        let thisYearDate = new Date(today.getFullYear(), month - 1, day);
        thisYearDate.setHours(0, 0, 0, 0);
        if (thisYearDate > today) {
            yearsPassed = Math.max(0, yearsPassed - 1);
        }
    }
    return { days: diffDays, years: yearsPassed };
}

function renderCds(){ 
    let list=document.getElementById('cd-list'); 
    if(!countdowns.length){ 
        list.innerHTML='<div style="text-align:center;padding:40px;color:var(--txt-l)">✨ 暂无纪念日，点击下方添加</div>'; 
        return; 
    } 
    let cdWithInfo=countdowns.map((cd,idx)=>{ 
        let info=getCountdownInfo(cd.type,cd); 
        return{cd,idx,days:info.days,years:info.years}; 
    }); 
    cdWithInfo.sort((a,b)=>a.days-b.days); 
    let html=''; 
    cdWithInfo.forEach(item=>{ 
        let cd=item.cd,info={days:item.days,years:item.years}; 
        html+=`<div class="cd-card" data-idx="${item.idx}" data-title="${escapeHtml(cd.title)}"><div class="cd-header"><div class="cd-title">${escapeHtml(cd.title)}</div><div class="cd-stats"><div class="days-stat"><span class="days-number">${info.days}</span><span class="days-label">天盼至</span></div><div class="years-stat"><span class="years-number">${info.years}</span><span class="years-label">春秋</span></div></div></div></div>`; 
    }); 
    list.innerHTML=html; 
    attachLongPressEvents(); 
}

function attachLongPressEvents(){

                showContextMenu(e.touches[0].clientX,e.touches[0].clientY,idx); 
            },500); 
        }); 
        card.addEventListener('touchend',()=>clearTimeout(timer));

    });

function renderMoodStats() {
    let oneYearAgo = new Date();
    oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
    let recentEntries = entries.filter(e => new Date(e.date) >= oneYearAgo);
    let moodCount = { happy:0, excited:0, calm:0, sad:0, angry:0, stimulate:0 };
    recentEntries.forEach(e => { if(e.mood && moodCount[e.mood] !== undefined) moodCount[e.mood]++; });
    let total = recentEntries.length;
    let area = document.getElementById('mood-stats-area');
    if (total === 0) {
        area.innerHTML = '<div style="text-align:center;padding:20px;">近一年暂无心情数据</div>';
        return;
    }
    let moodOrder = ['happy','excited','calm','sad','angry','stimulate'];
    let html = '<div class="mood-stats-list">';
    for (let m of moodOrder) {
        let count = moodCount[m];
        let pct = Math.round(count / total * 100);
        html += `<div class="mood-stat-item">
                    <div class="mood-stat-name">${moodIcons[m]} ${moodNames[m]}</div>
                    <div class="mood-stat-count">${count}次 (${pct}%)</div>
                </div>`;
    }
    html += '</div>';
    let topMood = moodOrder.reduce((a,b) => moodCount[a] > moodCount[b] ? a : b);
    let topPct = Math.round(moodCount[topMood] / total * 100);
    let advice = '';
    switch(topMood) {
        case 'happy': advice = `✨ 你近一年最常感到「开心」(${topPct}%)，继续保持这份阳光，生活会更美好！`; break;
        case 'excited': advice = `⚡ 你近一年最常感到「激动」(${topPct}%)，充满热情的你，记得适当放慢脚步休息。`; break;
        case 'calm': advice = `🍃 你近一年最常感到「平静」(${topPct}%)，心态平和是你的优势，偶尔也去尝试新鲜事物吧。`; break;
        case 'sad': advice = `🌧️ 你近一年「难过」的比例较高(${topPct}%)，记得多和朋友倾诉，给自己一些温柔。`; break;
        case 'angry': advice = `🔥 你近一年「生气」的次数较多(${topPct}%)，试着深呼吸，找些放松的方式调节情绪。`; break;
        case 'stimulate': advice = `💕 你近一年「刺激」体验较多(${topPct}%)，生活充满挑战，但也要注意劳逸结合哦！`; break;
        default: advice = `📝 继续记录心情，让每一天都有迹可循。`;
    }
    html += `<div class="mood-advice">💡 小建议：${advice}</div>`;
    area.innerHTML = html;
}

    document.getElementById('s-month').innerText=mc;

function renderYearCal() { 
    let y = new Date().getFullYear();
    let grid = document.getElementById('year-cal-grid');
    let html = ''; 
    for (let m = 0; m < 12; m++) { 
        let fd = new Date(y, m, 1).getDay();
        let dim = new Date(y, m + 1, 0).getDate(); 
        html += `<div class="mini-month"><div class="mm-title">${m + 1}月</div><div class="mm-grid">`; 
        for (let w = 0; w < 7; w++) {
            html += `<div style="font-size:6px;color:var(--txt-l);text-align:center">${['日','一','二','三','四','五','六'][w]}</div>`; 
        }
        for (let i = 0; i < fd; i++) {
            html += `<div></div>`; 
        }
        for (let d = 1; d <= dim; d++) { 
            let ds = `${y}-${pad(m + 1)}-${pad(d)}`;
            let entry = findEntry(ds);
            let has = !!entry;
            let icon = '';
            if (has && entry.mood && moodIcons[entry.mood]) {
                icon = moodIcons[entry.mood];
            }
            html += `<div class="mm-day ${has ? 'has-entry' : ''}" onclick="openEdFor('${ds}',false)">${d}${has ? icon : ''}</div>`; 
        } 
        html += `</div></div>`; 
    } 
    grid.innerHTML = html; 
}

async function exportFullBackup() {
    let loading = document.getElementById('loadingTip');
    loading.style.display = 'block';
    loading.textContent = '⏳ 正在导出数据...';
    try {
        let allMedia = await getAllMedia();
        let zip = new JSZip();
        let mediaData = {};
        for (let m of allMedia) {
            if (m.data) {
                mediaData[m.id] = {
                    data: m.data,
                    type: m.type || 'image/jpeg'
                };
            }
        }
        let dataJson = JSON.stringify({ 
            entries, 
            countdowns, 
            mediaData: mediaData,
            version: '3.0', 
            time: new Date().toISOString() 
        });
        zip.file('backup.json', dataJson);
        loading.textContent = '⏳ 正在生成ZIP文件...';
        let content = await zip.generateAsync({ 
            type: 'blob',
            compression: 'DEFLATE',
            compressionOptions: { level: 6 }
        });
        let url = URL.createObjectURL(content);
        let a = document.createElement('a');
        a.href = url;
        let now = new Date();
        a.download = `LJG_备份_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}.zip`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        alert(`导出成功！\n共 ${entries.length} 条日记，${Object.keys(mediaData).length} 个媒体文件`);
    } catch(e) { 
        console.error('导出失败:', e);
        alert('导出失败：' + e.message); 
    } finally { 
        loading.style.display = 'none'; 
    }
}

function openImportFile() { document.getElementById('import-file').click(); }

async function importZipFile(input) {
    let file = input.files[0];
    if (!file) return;
    let loading = document.getElementById('loadingTip');
    loading.style.display = 'block';
    loading.textContent = '⏳ 正在解析备份文件...';
    try {
        let zip = await JSZip.loadAsync(file);
        let dataFile = zip.file('backup.json') || zip.file('diary_data.json');
        if (!dataFile) throw new Error('备份文件格式错误，找不到数据文件');
        let dataContent = await dataFile.async('string');
        let backup = JSON.parse(dataContent);
        if (backup.entries) entries = backup.entries;
        if (backup.countdowns) countdowns = backup.countdowns;
        let mediaData = backup.mediaData || {};
        if (Object.keys(mediaData).length > 0) {
            await clearAllMedia();
            const dbRef = await openDB();
            const tx = dbRef.transaction([STORE_NAME], 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            let count = 0;
            for (let [id, info] of Object.entries(mediaData)) {
                if (info.data) {
                    store.put({
                        id: id,
                        data: info.data,
                        type: info.type || 'image/jpeg',
                        timestamp: Date.now()
                    });
                    count++;
                }
            }
            await new Promise((resolve, reject) => {
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
            console.log(`恢复了 ${count} 个媒体文件`);
        }
        localStorage.setItem('ljg_entries', JSON.stringify(entries));
        localStorage.setItem('ljg_cds', JSON.stringify(countdowns));
        alert(`恢复成功！\n共恢复 ${entries.length} 条日记，${countdowns.length} 个纪念日`);
        renderCal(); renderCds(); renderStats();
        if(aggEnabled) renderAggregate();
    } catch(e) { 
        console.error('恢复失败:', e);
        alert('恢复失败：' + e.message); 
    } finally { 
        loading.style.display = 'none'; 
        input.value = ''; 
    }
}

function clearAll(){ 
    if(confirm('清空全部数据？不可恢复')){ 
        entries=[]; 
        countdowns=[]; 
        localStorage.clear(); 
        indexedDB.deleteDatabase(DB_NAME); 
        db=null; 
        openDB(); 
        renderCal(); 
        renderCds(); 
        renderStats(); 
        alert('已清空'); 
    } 
}

function searchDiary(){ 
    let q=document.getElementById('search-input').value.trim().toLowerCase(); 
    let box=document.getElementById('search-results'); 
    if(!q){ 
        box.classList.remove('show'); 
        return; 
    } 
    let res=entries.filter(e=>(e.content||'').toLowerCase().includes(q)||e.date.includes(q)); 
    if(res.length===0){ 
        box.innerHTML='<div class="search-empty" style="padding:10px;text-align:center;">未找到相关日记</div>'; 
    } else { 
        box.innerHTML=res.map(r=>`<div class="search-item" onclick="openEdFor('${r.date}',false);document.getElementById('search-results').classList.remove('show');"><span class="si-date">${r.date}</span><div class="si-text">${(r.content||'').substring(0,40)}</div></div>`).join(''); 
    } 
    box.classList.add('show'); 
}

document.addEventListener('click', function(e) {
    let searchBox = document.getElementById('search-results');
    let searchInput = document.getElementById('search-input');
    if (searchBox && searchInput && !searchInput.contains(e.target) && !searchBox.contains(e.target)) {
        searchBox.classList.remove('show');
    }
});

document.getElementById('media-input').addEventListener('change',handleMedia);

// 初始化
init();
